<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Sync</title></head>
<body>
<script>
if (window.opener) {
  window.opener.postMessage({
    type: 'g2DataExport',
    data: localStorage.getItem('adaptive_learning_data')
  }, '*');
}
setTimeout(function() { window.close(); }, 400);
</script>
</body>
</html>
