<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Learning</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <h1>Adaptive Learning</h1>
    <p id="status">Waiting for glasses...</p>
    <button id="btn-connect">Connect glasses</button>
    <div id="event-log" style="margin-top:1em; font-family:monospace; font-size:12px; max-height:300px; overflow:auto;"></div>
  </div>
  <!-- Bridges: companion (file://) ↔ G2 app (localhost:5173) localStorage sync -->
  <!-- Both use window.name to pass data — avoids query-string routing issues with even-dev -->
  <script>
  (function () {
    var name = window.name || '';

    // Import bridge: companion sets window.name = 'AL_import_<base64url>' then opens /
    if (name.indexOf('AL_import_') === 0) {
      try {
        var b64 = name.slice(10).replace(/-/g, '+').replace(/_/g, '/').replace(/~/g, '=');
        var deck = JSON.parse(atob(b64));
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('adaptive_learning_data') || '{}'); } catch {}
        if (!Array.isArray(stored.decks)) stored.decks = [];
        stored.decks = stored.decks.filter(function (d) { return d.id !== deck.id; });
        stored.decks.push(deck);
        localStorage.setItem('adaptive_learning_data', JSON.stringify(stored));
      } catch (e) {}
      window.name = '';
      setTimeout(function() { window.close(); }, 100);
      return;
    }

    // Export bridge: companion opens / with window.opener set → send data back then close
    if (window.opener) {
      try {
        window.opener.postMessage({
          type: 'g2DataExport',
          data: localStorage.getItem('adaptive_learning_data')
        }, '*');
      } catch(e) {}
      setTimeout(function() { window.close(); }, 200);
      return;
    }
  })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
