<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Learning</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <h1>Adaptive Learning</h1>
    <p id="status">Waiting for glasses...</p>
    <button id="btn-connect">Connect glasses</button>
    <div id="event-log" style="margin-top:1em; font-family:monospace; font-size:12px; max-height:300px; overflow:auto;"></div>
  </div>
  <!-- Companion deck import bridge: companion opens /?import=BASE64DECK from file:// -->
  <script>
  (function () {
    var raw = new URLSearchParams(location.search).get('import');
    if (!raw) return;
    try {
      var deck = JSON.parse(atob(raw));
      var stored = {};
      try { stored = JSON.parse(localStorage.getItem('adaptive_learning_data') || '{}'); } catch {}
      if (!Array.isArray(stored.decks)) stored.decks = [];
      stored.decks = stored.decks.filter(function (d) { return d.id !== deck.id; });
      stored.decks.push(deck);
      localStorage.setItem('adaptive_learning_data', JSON.stringify(stored));
      document.addEventListener('DOMContentLoaded', function () {
        var bar = document.createElement('div');
        bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#232323;color:#fff;text-align:center;padding:14px;font-family:sans-serif;font-size:14px;letter-spacing:-.2px';
        bar.textContent = '\u2713 "' + deck.name + '" (' + deck.cards.length + ' cards) saved to G2 App. You can close this tab.';
        document.body.appendChild(bar);
        setTimeout(function () { window.close(); }, 3000);
      });
    } catch (e) {}
    history.replaceState({}, '', '/');
  })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
